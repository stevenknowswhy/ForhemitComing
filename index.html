<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forhemit | Private Equity</title>
    <meta name="description" content="Forhemit Private Equity - Coming Soon. Join the movement.">
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-mesh"></div>
    
    <main class="hero">
        <div class="container">
            <div class="logo-wrapper">
                <svg width="80" height="80" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" id="logo">
                    <rect width="100" height="100" rx="20" fill="url(#logo-gradient)"/>
                    <path d="M35 75V25H65V35H45V45H60V55H45V75H35Z" fill="white"/>
                    <defs>
                        <linearGradient id="logo-gradient" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#FF6B00"/>
                            <stop offset="1" stop-color="#FF3D00"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            
            <h1 class="brand-title">FORHEMIT</h1>
            <p class="brand-subtitle">PRIVATE EQUITY</p>
            
            <div class="cta-group">
                <button id="join-btn" class="btn btn-primary">Join the Movement</button>
                <div class="early-access-wrapper">
                    <button id="early-access-btn" class="btn btn-secondary">Get Early Access</button>
                    <div id="email-reveal" class="email-reveal-hidden">
                        <input type="email" id="email-input" placeholder="Your email address">
                        <button id="submit-email" class="btn-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M5 12h14M12 5l7 7-7 7"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <div class="modal-grid">
                <div class="modal-form-side">
                    <!-- Step 1 -->
                    <div id="step-1" class="form-step active">
                        <h2>Join the Movement</h2>
                        <p>We are looking for visionary minds to reshape the landscape of private equity. Are you ready to lead?</p>
                        <button class="btn btn-primary next-step" data-next="2">Continue</button>
                    </div>
                    
                    <!-- Step 2 -->
                    <div id="step-2" class="form-step">
                        <h2>Personal Details</h2>
                        <form id="recruitment-form">
                            <div class="input-group">
                                <label for="full-name">Full Name</label>
                                <input type="text" id="full-name" required placeholder="John Doe">
                            </div>
                            <div class="input-group">
                                <label for="phone">Phone Number</label>
                                <input type="tel" id="phone" required placeholder="+1 (555) 000-0000">
                            </div>
                            <div class="input-group">
                                <label for="email">Email Address</label>
                                <input type="email" id="email" required placeholder="john@example.com">
                            </div>
                            <div class="input-group">
                                <label for="position">Position Interest</label>
                                <select id="position" required>
                                    <option value="" disabled selected>Select a position</option>
                                    <!-- Populated by JS -->
                                </select>
                            </div>
                            <div id="other-position-wrapper" class="input-group hidden">
                                <label for="other-position">Specify Position</label>
                                <input type="text" id="other-position" placeholder="Please specify">
                            </div>
                            <button type="submit" class="btn btn-primary">Submit Application</button>
                        </form>
                    </div>
                    
                    <!-- Step 3 -->
                    <div id="step-3" class="form-step">
                        <div class="success-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="url(#logo-gradient)" stroke-width="2">
                                <path d="M20 6L9 17l-5-5"/>
                            </svg>
                        </div>
                        <h2>Thank You!</h2>
                        <p>Your application has been received. Our team will review your profile and get back to you shortly.</p>
                        <button class="btn btn-secondary" id="finish-btn">Close</button>
                    </div>
                </div>
                <div class="modal-image-side">
                    <img src="assets/recruit-face.jpg" alt="Join Forhemit" class="portrait-img">
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
